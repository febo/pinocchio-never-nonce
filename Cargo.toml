[workspace]
resolver = "2"
members = ["macro", "program"]

[workspace.lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = [
    'cfg(target_os, values("solana"))',
]

[workspace.dependencies]
p-never-nonce = { path = "macro" }
mollusk-svm = "0.12"
mollusk-svm-fuzz-fixture = "0.12"
pinocchio = "0.10"
